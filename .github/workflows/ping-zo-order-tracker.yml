name: Ping zo-order-tracker

on:
  schedule:
    - cron: "3/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Run paced keepalive sweep
        run: bash deployment/ping-service.sh
