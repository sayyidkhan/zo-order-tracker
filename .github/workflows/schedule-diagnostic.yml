name: Schedule diagnostic

on:
  schedule:
    - cron: "1/5 * * * *"
  workflow_dispatch:

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Print schedule context
        run: |
          date -u
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
